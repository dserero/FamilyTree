# Neo4j runs as a native systemd service on the host (not in Docker).
# Do NOT add Neo4j here — use `systemctl start neo4j` to manage it.
# Data lives in /var/lib/neo4j and is NOT affected by docker-compose down.

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: familytree-app
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
        env_file:
            - .env.local
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - familytree-network

networks:
    familytree-network:
        driver: bridge
