services:
    neo4j:
        image: neo4j:5.15.0
        container_name: familytree-neo4j
        profiles:
            - local
        restart: unless-stopped
        ports:
            - "7474:7474" # HTTP
            - "7687:7687" # Bolt
        environment:
            - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
            - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
            - NEO4J_dbms_memory_pagecache_size=512M
            - NEO4J_dbms_memory_heap_initial__size=512M
            - NEO4J_dbms_memory_heap_max__size=1G
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
        networks:
            - familytree-network
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:7474 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: familytree-app
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
        env_file:
            - .env.local
        networks:
            - familytree-network

volumes:
    neo4j_data:
    neo4j_logs:

networks:
    familytree-network:
        driver: bridge
